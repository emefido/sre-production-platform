modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes:
        - 200
      follow_redirects: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  http_api_health:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes:
        - 200
      follow_redirects: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
      headers:
        Accept: application/json
        User-Agent: sre-production-platform-blackbox
