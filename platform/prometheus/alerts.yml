groups:
  - name: sre-api-alerts
    rules:
      - alert: HighErrorBudgetBurnRate
        expr: api:error_budget_burn_rate > 10
        for: 2m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "High API error budget burn rate"
          description: "The API is consuming the error budget more than 10x faster than allowed by the 99.9% SLO."
