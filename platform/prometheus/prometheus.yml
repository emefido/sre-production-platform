global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "sre-api"
    static_configs:
      - targets:
          - "api-service:8000"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "blackbox-exporter"
    static_configs:
      - targets:
          - "blackbox-exporter:9115"

  - job_name: "blackbox-http"
    metrics_path: /probe

    params:
      module:
        - http_api_health

    static_configs:
      - targets:
          - "http://api-service:8000/health"
        labels:
          service: "sre-api"
          environment: "local"
          probe_type: "internal-http"
          criticality: "high"

    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"

  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"
