global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "sre-api"
    static_configs:
      - targets:
          - "api-service:8000"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"

  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"
