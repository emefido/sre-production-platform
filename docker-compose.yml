services:
  api-service:
    build:
      context: ./apps/api-service
      dockerfile: Dockerfile
    container_name: sre-api-service
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sre_platform
      DATABASE_USER: sre_admin
      DATABASE_PASSWORD: sre_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: sre-postgres
    environment:
      POSTGRES_DB: sre_platform
      POSTGRES_USER: sre_admin
      POSTGRES_PASSWORD: sre_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre_admin -d sre_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: sre-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./platform/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./platform/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - ./platform/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api-service
      - blackbox-exporter

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: sre-alertmanager

    ports:
      - "9093:9093"

    volumes:
      - ./platform/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

    restart: unless-stopped

    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:12.1.0
    container_name: sre-grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0
    container_name: sre-blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox_exporter/blackbox.yml"
      - "--log.level=info"
      - "--log.prober=info"
    volumes:
      - ./platform/blackbox/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    ports:
      - "9115:9115"
    depends_on:
      - api-service

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: sre-node-exporter

    ports:
      - "9100:9100"

    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: sre-cadvisor

    ports:
      - "8080:8080"

    privileged: true

    devices:
      - /dev/kmsg

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

    restart: unless-stopped

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1
    container_name: sre-postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/sre_platform?sslmode=disable"
      DATA_SOURCE_USER: "sre_admin"
      DATA_SOURCE_PASS: "sre_password"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.3
    container_name: sre-loki

    command: -config.file=/etc/loki/config.yml

    ports:
      - "3100:3100"

    volumes:
      - ./platform/loki/config.yml:/etc/loki/config.yml:ro

    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.8.1
    container_name: sre-tempo
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./platform/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4318:4318"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.3
    container_name: sre-promtail

    command: -config.file=/etc/promtail/config.yml

    volumes:
      - ./platform/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

    depends_on:
      - loki

    restart: unless-stopped

volumes:
  postgres_data:
  volumes:
