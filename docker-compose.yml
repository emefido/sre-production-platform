services:
  api-service:
    build:
      context: ./apps/api-service
      dockerfile: Dockerfile
    container_name: sre-api-service
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
