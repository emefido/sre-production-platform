services:
  api-service:
    build:
      context: ./apps/api-service
      dockerfile: Dockerfile
    container_name: sre-api-service
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sre_platform
      DATABASE_USER: sre_admin
      DATABASE_PASSWORD: sre_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: sre-postgres
    environment:
      POSTGRES_DB: sre_platform
      POSTGRES_USER: sre_admin
      POSTGRES_PASSWORD: sre_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre_admin -d sre_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
